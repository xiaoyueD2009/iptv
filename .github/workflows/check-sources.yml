name: Check and Clean IPTV Sources

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  check-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Backup original files
      run: |
        mkdir -p backup
        cp -f tv/iptv4.txt backup/iptv4.txt 2>/dev/null || true
        cp -f tv/iptv4.m3u backup/iptv4.m3u 2>/dev/null || true
        cp -f tv/iptv6.txt backup/iptv6.txt 2>/dev/null || true
        cp -f tv/iptv6.m3u backup/iptv6.m3u 2>/dev/null || true

    - name: Check IPTV4 sources
      run: |
        python tools/check_sources.py tv/iptv4.txt tv/iptv4.m3u           --workers 30 --timeout 5
      continue-on-error: true

    - name: Check IPTV6 sources
      run: |
        python tools/check_sources.py tv/iptv6.txt tv/iptv6.m3u           --workers 30 --timeout 5
      continue-on-error: true

    - name: Generate diff summary
      id: diff
      run: |
        echo "## IPTV 源检测报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        for f in tv/iptv4.txt tv/iptv6.txt; do
          if [ -f "$f" ] && [ -f "backup/$(basename $f)" ]; then
            old=$(grep -c "http" "backup/$(basename $f)" 2>/dev/null || echo "0")
            new=$(grep -c "http" "$f" 2>/dev/null || echo "0")
            echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
            echo "- 原始源数: $old" >> $GITHUB_STEP_SUMMARY
            echo "- 存活源数: $new" >> $GITHUB_STEP_SUMMARY
            if [ "$old" -gt 0 ]; then
              rate=$(awk "BEGIN{printf "%.1f", ($new/$old)*100}")
              echo "- 存活率: ${rate}%" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add tv/
        if git diff --cached --quiet; then
          echo "无变更，跳过提交"
        else
          git commit -m "chore: 自动清理失效源 [skip ci] $(date +%Y-%m-%d)"
          git push
        fi